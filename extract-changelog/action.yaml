name: 'Changelog Extractor'
description: 'Extracts multi-paragraph changelogs and fails/cleans up if missing.'
inputs:
  github-token:
    description: 'GitHub Token for tag cleanup'
    required: true
outputs:
  changelog-path:
    description: 'Path to the generated changelog file'
    value: ${{ steps.extract.outputs.changelog-path }}

runs:
  using: "composite"
  steps:
    - name: Extract & Format Changelog
      id: extract
      shell: bash
      run: |
        TAG_NAME=${GITHUB_REF#refs/tags/}
        chmod +x ${{ github.action_path }}/extract.sh
        ${{ github.action_path }}/extract.sh $TAG_NAME
        echo "changelog-path=RELEASE_CHANGELOG.md" >> $GITHUB_OUTPUT
      env:
        GH_TOKEN: ${{ inputs.github-token }}
