name: 'Kiwi build'
description: 'Build using kiwi'

inputs:
  image-directory:
    required: True
  target-directory:
    required: True
    default: ""
  repository:
    required: True
    default: https://download.opensuse.org/distribution/leap/15.6/repo/oss
  extra-repositories:
    required: True
    default: ""
  source-image:
    required: True
    default: ""
  kiwi-profile:
    description: 'kiwi-ng --profile value (global option, placed before the subcommand)'
    required: False
    default: ""
  kiwi-extra-args:
    required: True
    default: ""
  kiwi-debug:
    required: True
    default: ""
  git-tag:
    required: False
    default: ""
  target-arch:
    description: 'Target architecture for cross-arch builds (e.g. aarch64). Requires qemu-linux-user in the runner image.'
    required: False
    default: ""
  arch-suffix:
    description: 'Push image as :tag-<suffix> instead of :tag/:latest. Used in multi-arch builds; manifest creation handles the unified tags.'
    required: False
    default: ""

outputs:
  container-name:
    description: 'Container image name read from kiwi metadata'
    value: ${{ steps.build.outputs.container_name }}
  container-tag:
    description: 'Container version tag read from kiwi metadata'
    value: ${{ steps.build.outputs.container_tag }}

runs:
  using: "composite"
  steps:
    - id: build
      run: ${{github.action_path}}/build-kiwi-container.sh
      shell: bash
      env:
        image_dir: ${{inputs.image-directory}}
        target_dir: ${{inputs.target-directory}}
        repository: ${{inputs.repository}}
        extra_repos: ${{inputs.extra-repositories}}
        source_image: ${{inputs.source-image}}
        kiwi_profile: ${{inputs.kiwi-profile}}
        kiwi_extra_args: ${{inputs.kiwi-extra-args}}
        kiwi_debug: ${{inputs.kiwi-debug}}
        git_tag: ${{inputs.git-tag}}
        target_arch: ${{inputs.target-arch}}
        arch_suffix: ${{inputs.arch-suffix}}
